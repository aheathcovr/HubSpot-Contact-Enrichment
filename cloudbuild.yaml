steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hubspot-enrichment:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hubspot-enrichment:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/hubspot-enrichment']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hubspot-enrichment'
      - '--image=gcr.io/$PROJECT_ID/hubspot-enrichment:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=10'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=60s'
      - '--no-cpu-throttling'
      - '--set-secrets=HUBSPOT_API_KEY=HUBSPOT_API_KEY:latest'
      - '--set-secrets=OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest'
      - '--set-secrets=MILLIONVERIFIER_API_KEY=MILLIONVERIFIER_API_KEY:latest'
      - '--set-secrets=FULLENRICH_API_KEY=FULLENRICH_API_KEY:latest'
      - '--set-secrets=HUBSPOT_WEBHOOK_SECRET=HUBSPOT_WEBHOOK_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/hubspot-enrichment:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/hubspot-enrichment:latest'
