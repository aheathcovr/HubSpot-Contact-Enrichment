steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hubspot-enrichment:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/hubspot-enrichment:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/hubspot-enrichment']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hubspot-enrichment'
      - '--image=gcr.io/$PROJECT_ID/hubspot-enrichment:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=1800s'
      - '--no-cpu-throttling'
      - '--cpu-boost'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,BQ_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=us-central1,CLOUD_TASKS_QUEUE=hubspot-enrichment,CLOUD_RUN_SERVICE_URL=$_CLOUD_RUN_SERVICE_URL,CLOUD_TASKS_SA_EMAIL=$_CLOUD_TASKS_SA_EMAIL'
      - '--set-secrets=HUBSPOT_API_KEY=HUBSPOT_API_KEY:latest'
      - '--set-secrets=OPENROUTER_API_KEY=OPENROUTER_API_KEY:latest'
      - '--set-secrets=MILLIONVERIFIER_API_KEY=MILLIONVERIFIER_API_KEY:latest'
      - '--set-secrets=FULLENRICH_API_KEY=FULLENRICH_API_KEY:latest'
      - '--set-secrets=HUBSPOT_WEBHOOK_SECRET=HUBSPOT_WEBHOOK_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/hubspot-enrichment:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/hubspot-enrichment:latest'

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
